<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Item — Lab Inventory</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;min-height:100vh}
a{text-decoration:none;color:inherit}

.hdr{background:#1F4E79;color:#fff;padding:0 20px;display:flex;align-items:center;
     justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;
     box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr-logo{font-size:17px;font-weight:700}
.hdr-sub{font-size:11px;opacity:.6;margin-top:1px}
.hdr-back{background:rgba(255,255,255,.15);border:none;color:#fff;padding:7px 14px;
          border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;
          text-decoration:none;white-space:nowrap}
.hdr-back:hover{background:rgba(255,255,255,.25)}

.page{max-width:480px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.09);overflow:hidden}

/* ── Loading / error ── */
.loading{text-align:center;padding:52px 20px;color:#aaa;font-size:14px}
.spinner{width:32px;height:32px;border:3px solid #ddd;border-top-color:#2E75B6;
         border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-page{text-align:center;padding:52px 20px}
.error-page h2{font-size:18px;color:#1F4E79;margin-bottom:8px}
.error-page p{font-size:13px;color:#888;margin-bottom:20px;line-height:1.5}
.back-btn{display:inline-block;padding:10px 24px;background:#1F4E79;color:#fff;
          border-radius:8px;font-size:14px;font-weight:600}

/* ── Item header ── */
.item-hdr{padding:18px 20px}
.item-ref{font-size:22px;font-weight:700;color:#1F4E79;letter-spacing:-.3px}
.item-desc{font-size:13px;color:#555;margin-top:6px;line-height:1.5}
.item-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;align-items:center}
.meta-tag{font-size:12px;color:#888}
.macro-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;color:#fff}
.macro-Swagelok{background:#1F4E79}
.macro-Optics{background:#6C3483}
.macro-Equipment{background:#1E8449}
.macro-Tools{background:#922B21}
.macro-Cables{background:#7D6608}

/* ── Specs grid ── */
.specs{padding:16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.spec-label{font-size:10px;font-weight:700;text-transform:uppercase;
            letter-spacing:.06em;color:#aaa;margin-bottom:3px}
.spec-value{font-size:13px;color:#222;font-weight:500}
.spec-na{font-size:13px;color:#ccc;font-style:italic}
.specs-single{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.spec-row{display:flex;gap:12px;align-items:baseline}
.spec-row .spec-label{min-width:110px;margin-bottom:0}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.Unions{background:#D6EAF8;color:#1A5276}.Reducers{background:#D5F5E3;color:#1E8449}
.Male-Connectors{background:#FCF3CF;color:#7D6608}.Female-Connectors{background:#FDEBD0;color:#784212}
.Port-Connectors{background:#E8DAEF;color:#6C3483}.Bulkheads{background:#FADBD8;color:#922B21}
.Tube-Adapters{background:#D0ECE7;color:#1A5F4A}.Pipe-Fittings{background:#F2F3F4;color:#424949}
.Spare-Parts{background:#EAF2FF;color:#1F4E79}.Lens{background:#F5EEF8;color:#6C3483}
.Mirror{background:#EAF2FF;color:#1A5276}.Camera{background:#EAFAF1;color:#1E8449}
.Lamp{background:#FEF9E7;color:#7D6608}.Connector{background:#FADBD8;color:#922B21}
.Cable{background:#F2F3F4;color:#424949}

/* ── Quantity ── */
.qty-card{padding:20px 20px 24px}
.qty-title{font-size:11px;font-weight:700;text-transform:uppercase;
           letter-spacing:.07em;color:#aaa;margin-bottom:16px}
.qty-control{display:flex;align-items:center}
.qty-btn{width:60px;height:60px;border:none;border-radius:10px;font-size:30px;
         font-weight:700;cursor:pointer;display:flex;align-items:center;
         justify-content:center;transition:all .1s;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.qty-btn:active{transform:scale(.88)}
.qty-minus{background:#FADBD8;color:#922B21}
.qty-plus{background:#D5F5E3;color:#1E8449}
.qty-wrap{position:relative;flex:1;display:flex;flex-direction:column;align-items:center}
.qty-val{font-size:46px;font-weight:700;color:#1F4E79;line-height:1}
.qty-spin{font-size:11px;color:#2E75B6;margin-top:4px;display:none;height:16px}

/* ── Low stock ── */
.low-warn{background:#FFF3CD;border:1.5px solid #FFC107;border-radius:8px;
          padding:10px 16px;font-size:12px;color:#856404;font-weight:600;
          display:none;text-align:center}
.low-warn.show{display:block}

/* ── Actions ── */
.actions{padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.btn{width:100%;padding:15px;border:none;border-radius:8px;font-size:14px;
     font-weight:700;cursor:pointer;text-align:center;transition:all .12s;
     -webkit-tap-highlight-color:transparent;display:block}
.btn:active{transform:scale(.98)}
.btn-restock{background:#c0392b;color:#fff}
.btn-restock:hover{background:#a93226}
.btn-link{background:#1F4E79;color:#fff}
.btn-link:hover{background:#163d61}

/* ── Drawer neighbours ── */
.drawer-card{padding:16px 20px}
.drawer-title{font-size:11px;font-weight:700;text-transform:uppercase;
              letter-spacing:.07em;color:#aaa;margin-bottom:12px}
.drawer-list{display:flex;flex-direction:column;gap:8px}
.drawer-item{display:flex;align-items:center;gap:12px;padding:10px 14px;
             background:#f7f9fc;border-radius:8px;cursor:pointer;
             border:1.5px solid #e8eef5;transition:all .12s;text-decoration:none;color:inherit}
.drawer-item:hover{background:#eef6ff;border-color:#2E75B6}
.drawer-ref{font-size:13px;font-weight:700;color:#1F4E79;min-width:100px}
.drawer-desc{font-size:12px;color:#666;flex:1;line-height:1.3}
.drawer-qty{font-size:12px;font-weight:700;color:#888;white-space:nowrap}
.drawer-qty.low{color:#c0392b}
.drawer-spin{font-size:12px;color:#aaa;padding:8px 0}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
       background:#1F4E79;color:#fff;padding:10px 22px;border-radius:8px;
       font-size:13px;font-weight:600;display:none;z-index:999;
       box-shadow:0 3px 14px rgba(0,0,0,.22);white-space:nowrap;max-width:90vw;text-align:center}
.toast.err{background:#c0392b}
.toast.ok{background:#1E8449}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">Lab Inventory</div>
    <div class="hdr-sub">CARES Lab</div>
  </div>
  <a href="https://v-laf.github.io/swagelok/" class="hdr-back">← All items</a>
</div>

<div class="page" id="page">
  <div class="card loading" id="loading">
    <div class="spinner"></div>
    Loading item…
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API       = 'https://script.google.com/macros/s/AKfycby_yfxZTk21_P4LX8YNYZuqSem8ZNkvzF2wtHjjlXqcCpYGDCda77kzosBvrrBQ_eP0/exec';
const ITEM_BASE = 'https://v-laf.github.io/swagelok/item/';
const MAX_ATTEMPTS = 3;

// ── Helpers ────────────────────────────────────────────────────────────────
function getRefFromPath() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('ref')) return decodeURIComponent(params.get('ref'));
  const m = window.location.pathname.match(/\/item\/(.+)$/);
  return m ? decodeURIComponent(m[1]) : '';
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type === 'err' ? ' err' : type === 'ok' ? ' ok' : '');
  t.style.display = 'block';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.display = 'none', 3000);
}

function specVal(v) {
  if (!v || v === 'N/A' || v === '') return '<span class="spec-na">—</span>';
  return '<span class="spec-value">' + v + '</span>';
}

function jsonpFetch(url) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 10000);
    function cleanup() { clearTimeout(timer); delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); }
    window[cb] = d => { cleanup(); resolve(d); };
    script.onerror = () => { cleanup(); reject(new Error('Load error')); };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    document.head.appendChild(script);
  });
}

// ── Actions ────────────────────────────────────────────────────────────────
async function adjustQty(ref, delta, valEl, spinEl) {
  spinEl.style.display = 'block';
  try {
    const d = await jsonpFetch(API + '?action=adjustQty&ref=' + encodeURIComponent(ref) + '&delta=' + delta);
    if (d.ok) {
      valEl.textContent = d.qty;
      showToast(delta > 0 ? '+1 saved — ' + d.qty + ' in stock' : '-1 saved — ' + d.qty + ' in stock', 'ok');
      checkLow(d.qty);
    } else { showToast('Error: ' + (d.error || 'unknown'), 'err'); }
  } catch(e) { showToast('Network error — try again', 'err'); }
  spinEl.style.display = 'none';
}

async function requestRestock(ref, desc, qty, location, link, btn) {
  btn.disabled = true;
  btn.textContent = 'Sending…';
  try {
    const d = await jsonpFetch(
      API + '?action=restock&ref=' + encodeURIComponent(ref) +
      '&desc=' + encodeURIComponent(desc) +
      '&qty=' + encodeURIComponent(qty) +
      '&location=' + encodeURIComponent(location || '') +
      '&link=' + encodeURIComponent(link || '')
    );
    btn.textContent = '✓ Restock request sent';
    btn.style.background = '#D5F5E3';
    btn.style.color = '#1E8449';
    showToast('✓ Email sent', 'ok');
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '⚠  Request Restock by Email';
    showToast('Network error — try again', 'err');
  }
}

function checkLow(qty) {
  const w = document.getElementById('lowWarn');
  if (w) w.classList.toggle('show', (parseInt(qty) || 0) <= 2);
}

// ── Drawer neighbours ──────────────────────────────────────────────────────
// Cache of all items — populated once the item page loads
// Reused by loadDrawerNeighbours to avoid a second JSONP call
let _allItemsCache = null;

async function loadDrawerNeighbours(currentRef, location) {
  const listEl = document.getElementById('drawerList');
  if (!listEl || !location) return;
  try {
    // Reuse cached data if available, otherwise fetch with a short delay
    // to avoid JSONP race condition with the initial item fetch
    let all = _allItemsCache;
    if (!all) {
      await new Promise(r => setTimeout(r, 600));
      all = await jsonpFetch(API + '?loc=' + encodeURIComponent(location));
      _allItemsCache = all;
    }
    const neighbours = all.filter(r =>
      r.ref !== currentRef &&
      r.location &&
      r.location.trim().toLowerCase() === location.trim().toLowerCase()
    );
    if (neighbours.length === 0) {
      const card = document.getElementById('drawerCard');
      if (card) card.style.display = 'none';
      return;
    }
    listEl.innerHTML = neighbours.map(r => {
      const isLow    = Number(r.qty) <= 2;
      const isUnique = (r.uniqueitem || 'Yes').toLowerCase() !== 'no';
      if (isUnique) {
        return '<a class="drawer-item" href="' + ITEM_BASE + encodeURIComponent(r.ref) + '">' +
          '<span class="drawer-ref">' + r.ref + '</span>' +
          '<span class="drawer-desc">' + r.desc + '</span>' +
          '<span class="drawer-qty' + (isLow ? ' low' : '') + '">' + r.qty + (isLow ? ' ⚠' : '') + '</span>' +
          '</a>';
      } else {
        return '<div class="drawer-item" style="cursor:default;opacity:.7">' +
          '<span class="drawer-ref" style="color:#888">' + r.ref + '</span>' +
          '<span class="drawer-desc">' + r.desc + '</span>' +
          '<span class="drawer-qty" style="color:#ccc">no page</span>' +
          '</div>';
      }
    }).join('');
  } catch(e) {
    console.error('Drawer load error:', e);
    if (listEl) listEl.innerHTML = '<div class="drawer-spin">Could not load drawer contents</div>';
  }
}

// ── Custom item page renderers per macro category ──────────────────────────

function renderSwagelok(item) {
  const badgeCls = (item.category || '').replace(/ /g, '-');
  return `
    <div class="card item-hdr">
      <div class="item-ref">${item.ref}</div>
      <div class="item-desc">${item.desc}</div>
      <div class="item-meta">
        <span class="badge ${badgeCls}">${item.category || '—'}</span>
        ${item.location ? '<span class="meta-tag">📍 ' + item.location + '</span>' : '<span class="meta-tag" style="color:#f0ad4e">📍 No location set</span>'}
        <span class="meta-tag">${item.material || ''}</span>
        <span class="macro-badge macro-Swagelok">Swagelok</span>
      </div>
    </div>
    <div class="card specs">
      <div><div class="spec-label">Connection 1</div>${specVal(item.conn1)}</div>
      <div><div class="spec-label">Connection 2</div>${specVal(item.conn2)}</div>
      <div><div class="spec-label">Connection 3</div>${specVal(item.conn3)}</div>
      <div><div class="spec-label">Connection 4</div>${specVal(item.conn4)}</div>
      <div><div class="spec-label">Type</div>${specVal(item.type)}</div>
      <div><div class="spec-label">No. of Connections</div>${specVal(item.noconn)}</div>
    </div>`;
}

function renderOptics(item) {
  const badgeCls = (item.category || '').replace(/ /g, '-');
  return `
    <div class="card item-hdr">
      <div class="item-ref">${item.ref}</div>
      <div class="item-desc">${item.desc}</div>
      <div class="item-meta">
        <span class="badge ${badgeCls}">${item.category || '—'}</span>
        ${item.location ? '<span class="meta-tag">📍 ' + item.location + '</span>' : '<span class="meta-tag" style="color:#f0ad4e">📍 No location set</span>'}
        <span class="macro-badge macro-Optics">Optics</span>
      </div>
    </div>
    <div class="card specs">
      <div><div class="spec-label">Focal Distance</div>${specVal(item.focaldist)}</div>
      <div><div class="spec-label">Size</div>${specVal(item.size)}</div>
      <div><div class="spec-label">Wavelength Range</div>${specVal(item.wavelength)}</div>
      <div><div class="spec-label">Type</div>${specVal(item.category)}</div>
    </div>`;
}

function renderEquipment(item) {
  const badgeCls = (item.category || '').replace(/ /g, '-');
  return `
    <div class="card item-hdr">
      <div class="item-ref">${item.ref}</div>
      <div class="item-desc">${item.desc}</div>
      <div class="item-meta">
        <span class="badge ${badgeCls}">${item.category || '—'}</span>
        ${item.location ? '<span class="meta-tag">📍 ' + item.location + '</span>' : '<span class="meta-tag" style="color:#f0ad4e">📍 No location set</span>'}
        <span class="macro-badge macro-Equipment">Equipment</span>
      </div>
    </div>`;
}

function renderCables(item) {
  const badgeCls = (item.category || '').replace(/ /g, '-');
  return `
    <div class="card item-hdr">
      <div class="item-ref">${item.ref}</div>
      <div class="item-desc">${item.desc}</div>
      <div class="item-meta">
        <span class="badge ${badgeCls}">${item.category || '—'}</span>
        ${item.location ? '<span class="meta-tag">📍 ' + item.location + '</span>' : '<span class="meta-tag" style="color:#f0ad4e">📍 No location set</span>'}
        <span class="macro-badge macro-Cables">Cables & Connectors</span>
      </div>
    </div>
    <div class="card specs">
      <div><div class="spec-label">Category</div>${specVal(item.category)}</div>
      <div><div class="spec-label">Type</div>${specVal(item.type)}</div>
    </div>`;
}

function renderGeneric(item) {
  return `
    <div class="card item-hdr">
      <div class="item-ref">${item.ref}</div>
      <div class="item-desc">${item.desc}</div>
      <div class="item-meta">
        ${item.location ? '<span class="meta-tag">📍 ' + item.location + '</span>' : '<span class="meta-tag" style="color:#f0ad4e">📍 No location set</span>'}
        <span class="macro-badge macro-Tools">${item.macrocat || ''}</span>
      </div>
    </div>`;
}

function getSpecsHTML(item) {
  const mc = (item.macrocat || 'Swagelok').toLowerCase();
  if (mc === 'swagelok')              return renderSwagelok(item);
  if (mc === 'optics')                return renderOptics(item);
  if (mc === 'equipment')             return renderEquipment(item);
  if (mc === 'cables and connectors') return renderCables(item);
  return renderGeneric(item);
}

// ── Full item page render ──────────────────────────────────────────────────
function renderItem(item) {
  const page      = document.getElementById('page');
  const hasLink   = item.link && item.link !== 'N/A' && item.link !== '';
  const hasRestock = true; // always show restock button

  page.innerHTML =
    getSpecsHTML(item) +

    `<div class="low-warn" id="lowWarn">⚠️ Low stock — consider requesting a restock</div>

    <div class="card qty-card">
      <div class="qty-title">Stock Quantity</div>
      <div class="qty-control">
        <button class="qty-btn qty-minus" id="btnMinus" ontouchstart="">−</button>
        <div class="qty-wrap">
          <div class="qty-val" id="qtyVal">${item.qty}</div>
          <div class="qty-spin" id="qtySpin">saving…</div>
        </div>
        <button class="qty-btn qty-plus" id="btnPlus" ontouchstart="">+</button>
      </div>
    </div>

    <div class="card actions">
      <button class="btn btn-restock" id="btnRestock" ontouchstart="">
        ⚠️&nbsp; Request Restock by Email
      </button>
      ${hasLink ? '<a href="' + item.link + '" target="_blank" class="btn btn-link">🔗&nbsp; View Product Page</a>' : ''}
    </div>

    ${item.location
      ? '<div class="card drawer-card" id="drawerCard"><div class="drawer-title">📦 Also in this location</div><div class="drawer-list" id="drawerList"><div class="drawer-spin">Loading…</div></div></div>'
      : ''}`;

  const qtyVal  = document.getElementById('qtyVal');
  const qtySpin = document.getElementById('qtySpin');

  document.getElementById('btnMinus').addEventListener('click', () => adjustQty(item.ref, -1, qtyVal, qtySpin));
  document.getElementById('btnPlus').addEventListener('click',  () => adjustQty(item.ref, +1, qtyVal, qtySpin));
  document.getElementById('btnRestock').addEventListener('click', function() {
    requestRestock(item.ref, item.desc, parseInt(qtyVal.textContent) || 0, item.location, item.link || '', this);
  });

  checkLow(item.qty);
  document.title = item.ref + ' — Lab Inventory';
}

function renderError(ref) {
  document.getElementById('page').innerHTML = `
    <div class="card error-page">
      <h2>Item not found</h2>
      <p>No item with reference <strong>${ref}</strong> exists in the inventory.</p>
      <a href="https://v-laf.github.io/swagelok/" class="back-btn">← Back to inventory</a>
    </div>`;
  document.title = 'Not found — Lab Inventory';
}

// ── Load ───────────────────────────────────────────────────────────────────
async function loadItem() {
  const ref = getRefFromPath();
  if (!ref) { window.location.href = 'https://v-laf.github.io/swagelok/'; return; }

  for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
    try {
      document.getElementById('loading').innerHTML =
        attempt === 1
          ? '<div class="spinner"></div>Loading item…'
          : '<div class="spinner"></div>Loading… (attempt ' + attempt + ' of ' + MAX_ATTEMPTS + ')';

      const d = await jsonpFetch(API + '?ref=' + encodeURIComponent(ref));
      if (d.error || !d.ref) {
        renderError(ref);
      } else {
        renderItem(d);
        if (d.location) {
          // Pre-fetch all items and cache before calling drawer function
          // This avoids a second JSONP call competing with any pending requests
          jsonpFetch(API).then(all => {
            _allItemsCache = all;
            loadDrawerNeighbours(d.ref, d.location);
          }).catch(() => {
            loadDrawerNeighbours(d.ref, d.location);
          });
        }
      }
      return;
    } catch(e) {
      if (attempt === MAX_ATTEMPTS) {
        document.getElementById('page').innerHTML = `
          <div class="card" style="padding:24px;text-align:center">
            <p style="color:#c0392b;font-weight:700;margin-bottom:8px">Could not load item</p>
            <p style="font-size:13px;color:#888;margin-bottom:16px">
              The inventory API did not respond after ${MAX_ATTEMPTS} attempts.<br>
              This usually means the Apps Script is cold-starting — try again in a few seconds.
            </p>
            <button onclick="loadItem()" style="padding:10px 20px;background:#1F4E79;color:#fff;
              border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;
              margin-right:8px">Retry</button>
            <a href="https://v-laf.github.io/swagelok/" style="padding:10px 20px;
              background:#e8f0fe;color:#1F4E79;border-radius:8px;font-size:14px;
              font-weight:600;display:inline-block">← All items</a>
          </div>`;
      }
    }
  }
}

loadItem();
</script>
</body>
</html>
